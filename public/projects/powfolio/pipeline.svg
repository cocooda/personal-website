<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Powfolio pipeline diagram</title>
  <desc id="desc">Local-first pipeline from local repository evidence to redaction review and public-safe exports.</desc>
