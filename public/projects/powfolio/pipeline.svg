    <text x="126" y="368" fill="#B7B1A7" font-size="15">Docs, tests, git</text>
    <text x="358" y="304" fill="#6D9F9B" font-size="13" font-weight="700">COLLECT</text>
    <text x="358" y="339" fill="#F2EFE7" font-size="22" font-weight="700">Evidence</text>
