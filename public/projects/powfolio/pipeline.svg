  <text x="96" y="146" fill="#B7B1A7" font-family="Arial, sans-serif" font-size="15">Currently building: tested MVP, no public adoption claim.</text>
  <g fill="#15181D" stroke="#3A414B">
    <rect x="100" y="260" width="178" height="140" rx="14"/>
    <rect x="332" y="260" width="178" height="140" rx="14"/>
