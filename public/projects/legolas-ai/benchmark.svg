  <rect x="58" y="58" width="1164" height="644" rx="18" fill="#101216" stroke="#2A2E35"/>
  <text x="96" y="116" fill="#F2EFE7" font-family="Arial, sans-serif" font-size="34" font-weight="700">30-case Multi-source Benchmark</text>
  <text x="96" y="146" fill="#B7B1A7" font-family="Arial, sans-serif" font-size="15">CV source of truth; overlap baseline context. Older unrelated experiment values are not mixed here.</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#B7B1A7">
