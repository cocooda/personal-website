<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Legolas AI benchmark visualization</title>
  <desc id="desc">Three benchmark metrics from the formal CV: citation hit rate, legal-number recall, and multi-source fact score.</desc>
