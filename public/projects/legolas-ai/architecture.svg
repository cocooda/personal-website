<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Legolas AI architecture diagram</title>
  <desc id="desc">Architecture across frontend, backend, database, retrieval, language model providers, and tracing.</desc>
  <rect width="1280" height="760" rx="24" fill="#090A0D"/>
  <rect x="56" y="56" width="1168" height="648" rx="18" fill="#101216" stroke="#2A2E35"/>
