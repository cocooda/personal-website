<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HanoiWorld labelled world-model diagram</title>
  <desc id="desc">A labelled flow from driving scene to JEPA observation encoder, RSSM latent dynamics, actor-critic control, and scenario evaluation.</desc>
  <defs>
    <marker id="arrowMint" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#8BFFD9"/>
    </marker>
    <linearGradient id="panelGlow" x1="130" y1="126" x2="1138" y2="622" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15191E"/>
      <stop offset="1" stop-color="#0B1116"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" rx="24" fill="#080D10"/>
  <rect x="56" y="56" width="1168" height="648" rx="18" fill="url(#panelGlow)" stroke="#2E3842" stroke-width="2"/>
  <text x="96" y="118" fill="#F4F3EE" font-family="Arial, sans-serif" font-size="34" font-weight="700">HanoiWorld System Diagram</text>
  <text x="96" y="150" fill="#97A3AD" font-family="Arial, sans-serif" font-size="15">Qualitative architecture map. No unsupported numeric performance claims.</text>

  <g stroke="#8BFFD9" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowMint)">
    <path d="M286 342H362"/>
    <path d="M522 342H598"/>
    <path d="M758 342H834"/>
    <path d="M950 432C936 514 798 544 710 544"/>
    <path d="M570 544C424 538 252 490 220 432"/>
  </g>

  <g fill="#15191E" stroke="#51606D" stroke-width="2">
    <rect x="116" y="260" width="170" height="172" rx="16"/>
    <rect x="352" y="260" width="170" height="172" rx="16"/>
    <rect x="588" y="260" width="170" height="172" rx="16"/>
    <rect x="824" y="260" width="170" height="172" rx="16"/>
    <rect x="524" y="500" width="220" height="120" rx="16"/>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="140" y="306" fill="#8BFFD9" font-size="13" font-weight="700">DRIVING SCENE</text>
    <text x="140" y="342" fill="#F4F3EE" font-size="23" font-weight="700">Environment</text>
    <text x="140" y="372" fill="#A8B2BC" font-size="15">Highway, merge,</text>
    <text x="140" y="394" fill="#A8B2BC" font-size="15">roundabout states</text>

    <text x="376" y="306" fill="#8BFFD9" font-size="13" font-weight="700">OBSERVATION ENCODER</text>
    <text x="376" y="342" fill="#F4F3EE" font-size="23" font-weight="700">JEPA module</text>
    <text x="376" y="372" fill="#A8B2BC" font-size="15">Compact scene</text>
    <text x="376" y="394" fill="#A8B2BC" font-size="15">representation</text>

    <text x="612" y="306" fill="#8BFFD9" font-size="13" font-weight="700">LATENT DYNAMICS</text>
    <text x="612" y="342" fill="#F4F3EE" font-size="23" font-weight="700">RSSM state</text>
    <text x="612" y="372" fill="#A8B2BC" font-size="15">Predictive world</text>
    <text x="612" y="394" fill="#A8B2BC" font-size="15">model dynamics</text>

    <text x="848" y="306" fill="#8BFFD9" font-size="13" font-weight="700">CONTROL POLICY</text>
    <text x="848" y="342" fill="#F4F3EE" font-size="23" font-weight="700">Actor-critic</text>
    <text x="848" y="372" fill="#A8B2BC" font-size="15">Planning-oriented</text>
    <text x="848" y="394" fill="#A8B2BC" font-size="15">action selection</text>

    <text x="548" y="542" fill="#8BFFD9" font-size="13" font-weight="700">SCENARIO EVALUATION</text>
    <text x="548" y="578" fill="#F4F3EE" font-size="22" font-weight="700">Collision, reward, scenario metrics</text>
  </g>

  <g stroke="#2E3842" stroke-width="1" opacity="0.55">
    <path d="M96 196H1184"/>
    <path d="M96 664H1184"/>
  </g>
</svg>
